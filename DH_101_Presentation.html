<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Heroes 101 · Copilot Chat: Your Foundation</title>
<style>
/* ============ BRAND TOKENS ============ */
:root{
  /* Workshops & Training category = Teal + teal gradient */
  --teal:#1FAE97;
  --teal-deep:#127E6E;
  --teal-dark:#0C5A4F;
  --teal-bright:#4FD4C2;
  --cyan:#4FD4E2;
  /* core brand support */
  --navy:#003473;
  --navy-deep:#00295C;
  --blue:#1F4E8C;
  --gold:#FEC500;
  /* neutrals */
  --page:#F8F9FB;
  --white:#FFFFFF;
  --body:#1A2C5C;
  --muted:#5C6B8A;
  --subtle:#8A95AF;
  --hairline:#E4EAF5;
  --ink:#0A1F2B;
  --font:'Proxima Nova','Segoe UI',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  /* teal hero gradient (slightly outside guide for energy) */
  --grad-hero:linear-gradient(135deg,#0C5A4F 0%,#127E6E 42%,#1FAE97 78%,#4FD4E2 100%);
  --grad-soft:linear-gradient(135deg,#1FAE97 0%,#4FD4C2 100%);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#06302a;font-family:var(--font);color:var(--body);overflow:hidden}
body{-webkit-font-smoothing:antialiased}

/* ============ STAGE ============ */
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.slide{min-height:0}
.slide{
  position:absolute;width:100%;height:100%;
  display:none;flex-direction:column;
  /* top right bottom left — bottom clears the fixed nav bar (56px) */
  padding:clamp(20px,4.4vh,46px) clamp(28px,6vw,90px) clamp(74px,9vh,96px);
  background:var(--page);
  opacity:0;
  overflow:hidden;
}
.slide.active{display:flex;opacity:1;animation:slideIn .6s cubic-bezier(.2,.7,.2,1)}
@keyframes slideIn{from{opacity:0;transform:translateY(24px) scale(.99)}to{opacity:1;transform:none}}

/* dark slides */
.slide.dark{background:var(--grad-hero);color:#fff}
.slide.dark .eyebrow{color:rgba(255,255,255,.85)}
.slide.dark .slide-num{color:rgba(255,255,255,.6)}

/* ============ SLIDE CHROME ============ */
.topbar{display:flex;justify-content:space-between;align-items:flex-start;flex:0 0 auto}
.eyebrow{font-size:clamp(11px,1.15vw,15px);font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--teal-deep)}
.dh-logo{height:clamp(36px,4.8vh,56px);width:auto}
.slide.dark .dh-logo{filter:drop-shadow(0 2px 10px rgba(0,0,0,.35))}

.slide-body{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;min-height:0;overflow:hidden}

/* bottom banner */
.banner{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;
  margin-top:clamp(14px,2.4vh,28px)}
.lozenge{display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#fff;
  font-size:clamp(9px,.95vw,12px);font-weight:700;letter-spacing:.13em;text-transform:uppercase;
  padding:7px 15px;border-radius:999px;box-shadow:0 4px 14px rgba(31,174,151,.35)}
.slide.dark .lozenge{background:rgba(255,255,255,.16);backdrop-filter:blur(4px)}
.spectrum{display:flex;gap:4px;align-items:flex-end;height:14px}
.spectrum i{width:14px;height:7px;border-radius:3px;opacity:.5;transition:.3s}
.spectrum i.on{height:14px;opacity:1;box-shadow:0 2px 8px rgba(31,174,151,.5)}
.slide-num{font-size:12px;font-weight:600;color:var(--subtle)}

/* ============ TYPOGRAPHY ============ */
.h1{font-size:clamp(30px,min(5.6vw,8.4vh),84px);font-weight:800;line-height:1.04;letter-spacing:-.02em}
.h2{font-size:clamp(24px,min(4vw,6.2vh),56px);font-weight:800;line-height:1.06;letter-spacing:-.015em}
.h3{font-size:clamp(18px,min(2.3vw,3.6vh),34px);font-weight:700;line-height:1.1}
.lead{font-size:clamp(14px,min(1.7vw,2.7vh),24px);font-weight:400;line-height:1.5;color:var(--muted);max-width:60ch}
.slide.dark .lead{color:rgba(255,255,255,.9)}
.standfirst{font-size:clamp(14px,min(1.9vw,3vh),26px);font-weight:600;line-height:1.35;max-width:54ch}

.teal-text{color:var(--teal-deep)}
.fade{opacity:0;animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.d1{animation-delay:.12s}.d2{animation-delay:.24s}.d3{animation-delay:.36s}
.d4{animation-delay:.48s}.d5{animation-delay:.6s}.d6{animation-delay:.72s}

/* ============ TITLE SLIDE ============ */
.cover .slide-body{justify-content:center;align-items:flex-start}
.cover .h1{max-width:18ch}
.cover-tag{margin-top:auto;font-style:italic;font-weight:500;font-size:clamp(13px,min(1.6vw,2.5vh),22px);
  color:rgba(255,255,255,.92);letter-spacing:.01em}
.cover-sub{font-size:clamp(14px,min(1.9vw,3vh),26px);font-weight:500;color:rgba(255,255,255,.92);max-width:46ch;margin-top:18px}
.orb{position:absolute;border-radius:50%;filter:blur(2px);pointer-events:none}

/* ============ CARDS / GRID ============ */
.grid{display:grid;gap:clamp(12px,min(1.6vw,2.2vh),26px)}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.card{background:#fff;border:1px solid var(--hairline);border-radius:18px;padding:clamp(14px,min(2.1vw,3vh),30px);
  box-shadow:0 10px 30px rgba(16,40,80,.06);position:relative;overflow:hidden}
.card .ico{width:clamp(42px,4vw,58px);height:clamp(42px,4vw,58px);border-radius:14px;display:flex;
  align-items:center;justify-content:center;background:var(--grad-soft);margin-bottom:16px;
  box-shadow:0 8px 20px rgba(31,174,151,.3)}
.card .ico svg{width:55%;height:55%;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.card h4{font-size:clamp(15px,min(1.7vw,2.7vh),23px);font-weight:700;margin-bottom:8px;line-height:1.15}
.card p{font-size:clamp(12px,min(1.25vw,2vh),17px);color:var(--muted);line-height:1.5}
.card .edge{position:absolute;top:0;left:0;width:5px;height:100%;background:var(--grad-soft)}

/* numbered list rows (agenda) */
.rows{display:flex;flex-direction:column;gap:clamp(8px,1.1vh,16px);max-width:none}
.row{display:flex;align-items:center;gap:18px;background:#fff;border:1px solid var(--hairline);
  border-radius:14px;padding:clamp(12px,1.5vh,20px) clamp(16px,1.8vw,26px);
  box-shadow:0 6px 18px rgba(16,40,80,.05)}
.row .n{flex:0 0 auto;width:clamp(34px,3.4vw,46px);height:clamp(34px,3.4vw,46px);border-radius:11px;
  background:var(--grad-soft);color:#fff;font-weight:800;font-size:clamp(15px,1.5vw,21px);
  display:flex;align-items:center;justify-content:center}
.row .lbl{flex:1;font-size:clamp(13px,min(1.6vw,2.5vh),22px);font-weight:600}
.row .min{flex:0 0 auto;font-size:clamp(12px,1.2vw,16px);font-weight:700;color:var(--teal-deep);
  background:rgba(31,174,151,.1);padding:5px 12px;border-radius:999px}

/* ============ SECTION DIVIDER ============ */
.divider .slide-body{justify-content:center}
.divider .kicker{font-size:clamp(13px,1.4vw,18px);font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(255,255,255,.8);margin-bottom:18px}
.divider .h2{max-width:20ch}
.divider .standfirst{color:rgba(255,255,255,.92);margin-top:20px}
.bignum{position:absolute;right:5vw;top:50%;transform:translateY(-50%);font-size:34vh;font-weight:800;
  color:rgba(255,255,255,.07);line-height:1;letter-spacing:-.04em;pointer-events:none}

/* ============ DEMO / CHAT MOCKUP ============ */
.demo-wrap{display:grid;grid-template-columns:1.15fr .85fr;gap:clamp(18px,2.2vw,34px);align-items:stretch}
.browser{background:#fff;border-radius:16px;border:1px solid var(--hairline);overflow:hidden;
  box-shadow:0 18px 50px rgba(16,40,80,.14);display:flex;flex-direction:column;min-height:0}
.bbar{display:flex;align-items:center;gap:7px;padding:11px 15px;background:#EDF1F7;border-bottom:1px solid var(--hairline)}
.bbar .dot{width:11px;height:11px;border-radius:50%}
.bbar .url{flex:1;margin-left:10px;background:#fff;border-radius:7px;font-size:12px;color:var(--muted);
  padding:6px 12px;display:flex;align-items:center;gap:7px}
.tick{color:var(--teal);font-weight:800}
.chat{padding:clamp(14px,1.8vw,22px);display:flex;flex-direction:column;gap:14px;flex:1;overflow:hidden;background:linear-gradient(180deg,#fff,#FAFCFE)}
.bub{max-width:88%;padding:13px 17px;border-radius:16px;font-size:clamp(13px,1.25vw,16px);line-height:1.45;opacity:0;animation:pop .5s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.bub.me{align-self:flex-end;background:var(--grad-soft);color:#fff;border-bottom-right-radius:5px;box-shadow:0 6px 16px rgba(31,174,151,.3)}
.bub.ai{align-self:flex-start;background:#fff;border:1px solid var(--hairline);border-bottom-left-radius:5px;box-shadow:0 4px 14px rgba(16,40,80,.06)}
.bub.ai .who{display:flex;align-items:center;gap:7px;font-weight:700;font-size:12px;color:var(--teal-deep);margin-bottom:6px}
.bub.ai .who .sw{width:16px;height:16px}
.src{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--teal-deep);
  background:rgba(31,174,151,.1);padding:3px 9px;border-radius:999px;margin-top:8px}
.typing{display:flex;gap:5px;padding:4px 0}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

.steps{display:flex;flex-direction:column;gap:13px;justify-content:center}
.steps .st{display:flex;gap:14px;align-items:flex-start}
.steps .st .sn{flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:var(--teal);color:#fff;
  font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;margin-top:1px}
.steps .st p{font-size:clamp(13px,1.35vw,18px);line-height:1.4;font-weight:500}
.steps h4{font-size:13px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--teal-deep);margin-bottom:4px}

/* best practice callout */
.bp{display:flex;gap:14px;align-items:center;background:linear-gradient(135deg,rgba(31,174,151,.12),rgba(79,212,226,.12));
  border:1.5px solid rgba(31,174,151,.3);border-radius:14px;padding:14px 20px;margin-top:18px}
.bp .star{flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:var(--grad-soft);display:flex;align-items:center;justify-content:center}
.bp .star svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.bp p{font-size:clamp(13px,1.3vw,17px);font-weight:600;line-height:1.35}
.bp b{color:var(--teal-deep)}

/* prompt chip inline */
.promptchip{font-style:italic;color:var(--ink)}

/* ============ NAV BAR ============ */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:6px;
  padding:9px 16px;background:rgba(8,42,37,.92);backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.08);transform:translateY(0);transition:transform .35s}
#nav.hidden{transform:translateY(100%)}
.nav-btn{flex:0 0 auto;width:34px;height:34px;border-radius:9px;border:none;cursor:pointer;
  background:rgba(255,255,255,.1);color:#fff;display:flex;align-items:center;justify-content:center;transition:.2s}
.nav-btn:hover{background:var(--teal)}
.nav-btn svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.nav-track{flex:1;display:flex;gap:5px;overflow-x:auto;padding:2px 6px;scrollbar-width:none}
.nav-track::-webkit-scrollbar{display:none}
.nav-pip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;
  padding:4px 9px;border-radius:9px;transition:.2s;min-width:46px}
.nav-pip:hover{background:rgba(255,255,255,.08)}
.nav-pip .bar{width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,.22);transition:.25s}
.nav-pip.active .bar{background:var(--teal-bright);box-shadow:0 0 10px rgba(79,212,226,.7)}
.nav-pip .t{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.55);white-space:nowrap;letter-spacing:.02em}
.nav-pip.active .t{color:#fff}
.nav-count{flex:0 0 auto;font-size:12px;font-weight:700;color:rgba(255,255,255,.7);padding:0 10px;font-variant-numeric:tabular-nums}
.progress{position:fixed;top:0;left:0;height:3px;background:var(--grad-soft);z-index:60;transition:width .5s cubic-bezier(.2,.7,.2,1);box-shadow:0 0 12px rgba(79,212,226,.6)}

/* hint */
.hint{position:fixed;bottom:62px;right:18px;z-index:40;background:rgba(8,42,37,.85);color:#fff;
  font-size:12px;padding:8px 14px;border-radius:999px;opacity:.0;animation:hintfade 5s ease forwards;pointer-events:none}
@keyframes hintfade{0%{opacity:0}12%{opacity:1}80%{opacity:1}100%{opacity:0}}

/* floating shapes */
.float{position:absolute;pointer-events:none;opacity:.9}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
@keyframes driftOrb{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(3vw,-4vh) scale(1.08)}66%{transform:translate(-2vw,3vh) scale(.96)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.08);opacity:1}}

.stat-num{font-size:clamp(40px,6vw,92px);font-weight:800;letter-spacing:-.03em;line-height:1;
  background:var(--grad-hero);-webkit-background-clip:text;background-clip:text;color:transparent}



/* ============ TITLE HERO (slide 1 only) ============ */
.title-hero{overflow:hidden;background:linear-gradient(135deg,#0C5A4F 0%,#127E6E 40%,#1FAE97 72%,#4FD4E2 100%);background-size:200% 200%;animation:bgShift 18s ease-in-out infinite}
@keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
/* aurora: slow rotating conic colour wash */
.hero-aurora{position:absolute;inset:-30%;z-index:0;pointer-events:none;opacity:.5;
  background:conic-gradient(from 0deg at 50% 50%,rgba(79,212,226,.35),transparent 25%,rgba(31,174,151,.3) 50%,transparent 75%,rgba(79,212,226,.35));
  filter:blur(40px);animation:auroraSpin 28s linear infinite}
@keyframes auroraSpin{to{transform:rotate(360deg)}}
/* diagonal light sheen sweeping across */
.hero-sheen{position:absolute;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(115deg,transparent 38%,rgba(255,255,255,.10) 50%,transparent 62%);
  background-size:250% 100%;animation:sheen 9s ease-in-out infinite}
@keyframes sheen{0%{background-position:140% 0}100%{background-position:-40% 0}}
/* soft drifting ribbons */
.ribbon{position:absolute;z-index:0;pointer-events:none;border-radius:50%;filter:blur(30px);opacity:.5}
.ribbon.r1{width:60vw;height:18vh;left:-10vw;top:20%;background:linear-gradient(90deg,transparent,rgba(79,212,226,.4),transparent);animation:ribbonA 16s ease-in-out infinite}
.ribbon.r2{width:55vw;height:16vh;right:-10vw;bottom:18%;background:linear-gradient(90deg,transparent,rgba(31,174,151,.4),transparent);animation:ribbonB 20s ease-in-out infinite}
@keyframes ribbonA{0%,100%{transform:translateX(0) rotate(-6deg)}50%{transform:translateX(8vw) rotate(-3deg)}}
@keyframes ribbonB{0%,100%{transform:translateX(0) rotate(5deg)}50%{transform:translateX(-8vw) rotate(2deg)}}
.hero-logo-wrap{display:inline-flex;opacity:1;
  margin-bottom:clamp(14px,2.4vh,28px);
  animation:logoIntro .8s cubic-bezier(.2,.7,.2,1) both,logoFloat 6s ease-in-out 1s infinite}
.hero-logo{height:clamp(84px,18vh,180px);width:auto;display:block;
  filter:drop-shadow(0 6px 22px rgba(0,0,0,.45)) drop-shadow(0 0 30px rgba(79,212,226,.5))}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes logoIntro{from{opacity:0;transform:translateY(24px) scale(.92)}to{opacity:1;transform:none}}
/* limelight glow pulsing behind the logo */
.hero-glow{position:absolute;top:34%;left:50%;width:60vh;height:60vh;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(79,212,226,.28),rgba(31,174,151,.12) 45%,transparent 70%);
  pointer-events:none;animation:glowPulse 5s ease-in-out infinite;z-index:0}
@keyframes glowPulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}}
/* faint moving grid for depth */
.hero-grid{position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.35;
  background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);
  background-size:54px 54px;mask-image:radial-gradient(circle at 50% 40%,#000,transparent 78%);
  -webkit-mask-image:radial-gradient(circle at 50% 40%,#000,transparent 78%);animation:gridDrift 24s linear infinite}
@keyframes gridDrift{from{background-position:0 0}to{background-position:54px 54px}}
.title-hero .slide-body,.title-hero .cover-tag{position:relative;z-index:2}
/* floating sparkles */
.spark{position:absolute;width:8px;height:8px;border-radius:50%;background:rgba(79,212,226,.9);
  box-shadow:0 0 12px rgba(79,212,226,.9);z-index:1;animation:sparkle 7s ease-in-out infinite}
.spark.s1{top:22%;left:16%;animation-delay:0s}
.spark.s2{top:30%;right:18%;width:6px;height:6px;animation-delay:1.4s}
.spark.s3{bottom:26%;left:24%;width:5px;height:5px;animation-delay:2.6s}
.spark.s4{bottom:32%;right:22%;animation-delay:3.6s}
.spark.s5{top:18%;left:46%;width:5px;height:5px;animation-delay:4.8s}
@keyframes sparkle{0%,100%{opacity:0;transform:translateY(0) scale(.6)}40%{opacity:1;transform:translateY(-14px) scale(1)}60%{opacity:1}80%{opacity:0;transform:translateY(-26px) scale(.7)}}


/* ============ UI WALKTHROUGH MOCKUP ============ */
.ui-mock{padding:clamp(16px,2vw,26px);display:flex;flex-direction:column;gap:14px;flex:1;background:linear-gradient(180deg,#fff,#F4FBF9);min-height:0}
.ui-row{display:flex;align-items:center;gap:8px;position:relative}
.ui-pill{font-size:clamp(12px,1.2vw,15px);font-weight:700;padding:6px 16px;border-radius:999px;background:#EEF3F2;color:var(--muted)}
.ui-pill.ui-on{background:var(--grad-soft);color:#fff;box-shadow:0 4px 12px rgba(31,174,151,.3)}
.ui-tag{font-size:11px;font-weight:700;color:var(--teal-deep);background:rgba(31,174,151,.12);padding:4px 10px;border-radius:8px;margin-left:auto}
.ui-tag-b{margin-left:12px}
.ui-greet{font-size:clamp(18px,2.2vw,30px);font-weight:800;color:var(--body);margin-top:8px;letter-spacing:-.01em}
.ui-chips{display:flex;flex-wrap:wrap;gap:8px}
.ui-chips span{font-size:clamp(12px,1.2vw,15px);font-weight:600;color:var(--teal-deep);background:#fff;border:1px solid var(--hairline);padding:8px 14px;border-radius:999px;box-shadow:0 3px 10px rgba(16,40,80,.05)}
.ui-spacer{flex:1;min-height:8px}
.ui-promptbox{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid rgba(31,174,151,.4);border-radius:14px;padding:12px 16px;box-shadow:0 6px 18px rgba(16,40,80,.07);position:relative}
.ui-add{width:30px;height:30px;border-radius:9px;background:#EEF3F2;color:var(--teal-deep);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:18px}
.ui-placeholder{flex:1;color:var(--subtle);font-size:clamp(13px,1.3vw,16px)}
.ui-send{width:30px;height:30px;border-radius:9px;background:var(--grad-soft);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px}

/* ============ SAFE SLIDE BACKGROUND SHIELD ============ */
.shield-bg{position:absolute;right:-3vw;top:50%;transform:translateY(-50%);
  height:min(86vh,860px);width:auto;opacity:.07;pointer-events:none;z-index:0;
  filter:saturate(.9);animation:shieldIn 1.1s ease both}
@keyframes shieldIn{from{opacity:0;transform:translateY(-50%) scale(.94)}to{opacity:.07;transform:translateY(-50%) scale(1)}}
/* keep slide content above the watermark */
.slide .topbar,.slide .slide-body,.slide .banner{position:relative;z-index:1}

/* ============ LIVE DEMO PLACEHOLDER SLIDE ============ */
.demoholder .slide-body{justify-content:center;align-items:center;text-align:center}
.demoholder .pulse-ring{position:absolute;width:62vh;height:62vh;border-radius:50%;
  border:2px solid rgba(255,255,255,.18);animation:ring 3s ease-out infinite;pointer-events:none}
.demoholder .pulse-ring:nth-child(2){animation-delay:1s}
.demoholder .pulse-ring:nth-child(3){animation-delay:2s}
@keyframes ring{0%{transform:scale(.5);opacity:.9}100%{transform:scale(1.25);opacity:0}}
.live-badge{display:inline-flex;align-items:center;gap:12px;margin-bottom:24px}
.live-dot{width:18px;height:18px;border-radius:50%;background:#FF4D4D;box-shadow:0 0 0 0 rgba(255,77,77,.7);animation:livepulse 1.6s infinite}
@keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(255,77,77,.7)}70%{box-shadow:0 0 0 18px rgba(255,77,77,0)}100%{box-shadow:0 0 0 0 rgba(255,77,77,0)}}
.live-badge span{font-size:clamp(13px,1.5vw,19px);font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.92)}
.demoholder .big{font-size:clamp(54px,11vw,168px);font-weight:800;line-height:.92;letter-spacing:-.03em;
  background:linear-gradient(135deg,#fff 0%,#4FD4E2 60%,#1FAE97 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.demoholder .what{font-size:clamp(18px,2.3vw,34px);font-weight:600;color:#fff;margin-top:10px}
.cta-pill{display:inline-flex;align-items:center;gap:14px;margin-top:38px;background:#fff;color:var(--teal-dark);
  font-size:clamp(14px,min(1.9vw,3vh),26px);font-weight:800;padding:16px 30px;border-radius:999px;
  box-shadow:0 14px 40px rgba(0,0,0,.3);text-decoration:none;transition:.25s;position:relative;z-index:2}
.cta-pill:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 20px 50px rgba(0,0,0,.4)}
.cta-pill .arrow{display:inline-flex;width:34px;height:34px;border-radius:50%;background:var(--grad-soft);
  align-items:center;justify-content:center;animation:nudge 1.4s ease-in-out infinite}
.cta-pill .arrow svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
@keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}
.cta-sub{margin-top:18px;font-size:clamp(13px,1.4vw,18px);color:rgba(255,255,255,.7)}

@media (max-width:820px){
  .demo-wrap{grid-template-columns:1fr}.g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}
  .bignum{display:none}.steps{display:none}
}
</style>
</head>

/* ================= CHAT SCRIPTS (typed reveal) ================= */
const CHATS = {
  ci:[
    {t:'me',h:'Use UK English. Be calm, confident and warm. Use clear structure and no jargon. Do not use contractions or em dashes.'},
    {t:'ai',h:'Saved to your personalisation. From now on every conversation will use UK English with a calm, clear, jargon-free tone.',src:'Settings › Personalisation'},
    {t:'me',h:'Draft a quick note to the team about Friday.'},
    {t:'ai',h:'Here is a short note in your saved style: "Hello team, a quick update for Friday..."',src:null}
  ],
  wins:[
    {t:'me',h:'What should be on my radar from my emails last week?'},
    {t:'ai',h:'Three things stand out: the rollout sign off is waiting on you, Priya asked for the updated timeline, and finance need the figures by Thursday.',src:'4 emails · Teams'},
    {t:'me',h:'Summarise this email thread and give me the key points and any actions.'},
    {t:'ai',h:'Key points: launch moved to the 18th, training booked, budget confirmed. Actions: you to confirm the room, Sam to send invites.',src:'1 thread · 9 messages'}
  ],
  priorities:[
    {t:'me',h:'I have just come back from leave. Analyse my inbox and give me my priorities, with anything outstanding that needs me first.'},
    {t:'ai',h:'Here is what needs you first: 1) the rollout sign off has been waiting five days, 2) Priya needs the timeline before her review tomorrow, 3) finance asked for the figures, now overdue.',src:'27 emails · Teams'},
    {t:'me',h:'Rank them by deadline, and flag anything where someone is blocked on me.'},
    {t:'ai',h:'Ranked by deadline: Priya (tomorrow, she is blocked on you), finance (today, overdue), rollout sign off (no date, but ageing). Two people are waiting on your reply.',src:null}
  ]
};

/* ================= ENGINE ================= */
const stage=document.getElementById('stage');
const track=document.getElementById('navTrack');
const prog=document.getElementById('prog');
const count=document.getElementById('count');
let idx=0, max=SLIDES.length;

/* render slides */
SLIDES.forEach((s,i)=>{ const w=document.createElement('div'); w.innerHTML=s.html.trim(); const el=w.firstElementChild; el.dataset.i=i; stage.appendChild(el); });
const slideEls=[...stage.children];

/* build nav */
SLIDES.forEach((s,i)=>{
  const p=document.createElement('div'); p.className='nav-pip'; p.dataset.i=i;
  p.innerHTML=`<div class="bar"></div><div class="t">${s.nav}</div>`;
  p.onclick=()=>go(i); track.appendChild(p);
});
const pips=[...track.children];

function typeChat(key){
  const box=document.getElementById('chat-'+key);
  if(!box) return; box.innerHTML='';
  const seq=CHATS[key]; let n=0;
  function add(){
    if(n>=seq.length) return;
    const m=seq[n];
    if(m.t==='ai'){
      const typing=document.createElement('div');
      typing.className='bub ai'; typing.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
      box.appendChild(typing); box.scrollTop=box.scrollHeight;
      setTimeout(()=>{
        typing.innerHTML=`<div class="who">${swirlMini} Copilot</div>${m.h}${m.src?`<br><span class="src">🔗 ${m.src}</span>`:''}`;
        box.scrollTop=box.scrollHeight; n++; setTimeout(add,750);
      },820);
    } else {
      const b=document.createElement('div'); b.className='bub me'; b.textContent=m.h;
      box.appendChild(b); box.scrollTop=box.scrollHeight; n++; setTimeout(add,650);
    }
  }
  setTimeout(add,500);
}

function go(i){
  i=Math.max(0,Math.min(max-1,i));
  slideEls[idx].classList.remove('active');
  idx=i;
  const el=slideEls[idx]; el.classList.add('active');
  /* restart fade animations */
  el.querySelectorAll('.fade').forEach(f=>{f.style.animation='none'; void f.offsetWidth; f.style.animation='';});
  pips.forEach((p,j)=>p.classList.toggle('active',j===idx));
  if(pips[idx].scrollIntoView) pips[idx].scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'});
  prog.style.width=((idx)/(max-1)*100)+'%';
  count.textContent=`${idx+1} / ${max}`;
  const demo=SLIDES[idx].demo; if(demo) typeChat(demo);
}

document.getElementById('next').onclick=()=>go(idx+1);
document.getElementById('prev').onclick=()=>go(idx-1);
document.getElementById('fs').onclick=()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ') {e.preventDefault();go(idx+1);}
  if(e.key==='ArrowLeft'||e.key==='PageUp') {e.preventDefault();go(idx-1);}
  if(e.key==='Home') go(0); if(e.key==='End') go(max-1);
  if(e.key==='f') document.getElementById('fs').click();
});
/* swipe */
let sx=0; stage.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
stage.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-sx; if(Math.abs(d)>50) go(idx+(d<0?1:-1));},{passive:true});

go(0);

</script>
</body>
</html>
